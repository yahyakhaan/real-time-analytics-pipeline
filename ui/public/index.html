<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAANG Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 30px; }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 600; color: #e2e8f0; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .card h2 { margin-top: 0; font-size: 1.2rem; color: #cbd5e1; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 20px;}
        .full-width { grid-column: 1 / -1; }
        
        /* Metric Box */
        .metric-container { display: flex; justify-content: space-around; padding-bottom: 20px; }
        .metric-box { text-align: center; }
        .metric-value { font-size: 3rem; font-weight: bold; color: #10b981; line-height: 1; }
        .metric-label { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }

        .leaderboard-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #334155; }
        .leaderboard-row:last-child { border-bottom: none; }
        .city-name { font-weight: 500; }
        .revenue-amount { color: #10b981; font-weight: bold; font-family: monospace; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>Live Operations Center</h1>
    
    <div class="grid">
        <div class="card full-width" style="display: flex; gap: 40px;">
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                <div class="metric-box">
                    <div class="metric-value" id="activeUsersCounter">0</div>
                    <div class="metric-label">Unique Active Users</div>
                </div>
            </div>
            <div style="flex: 3;">
                <h2>Event Throughput (Last 5 Mins)</h2>
                <canvas id="lineChart" height="90"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Active Ride Requests by City</h2>
            <canvas id="cityChart"></canvas>
        </div>

        <div class="card">
            <h2>Revenue Leaderboard (10s Rolling)</h2>
            <div id="leaderboard"></div>
        </div>
    </div>
    <h2 style="margin-top: 50px; border-bottom: 1px solid #334155; padding-bottom: 10px;">Historical Analysis (PostgreSQL)</h2>
    <div class="card full-width" style="margin-bottom: 50px;">
        <h2>All-Time Revenue by City</h2>
        <canvas id="historicalChart" height="80"></canvas>
    </div>

    <script>
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.scale.grid.color = 'rgba(255,255,255,0.05)';

        // 1. Initialize Line Chart (Time Series)
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        const lineChart = new Chart(lineCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Total Events per 10s', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 3, tension: 0.4, fill: true }] },
            options: { animation: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        // 2. Initialize Doughnut Chart
        const cityCtx = document.getElementById('cityChart').getContext('2d');
        const cityChart = new Chart(cityCtx, {
            type: 'doughnut',
            data: { labels: ['Atlanta', 'San Francisco', 'New York', 'Chicago'], datasets: [{ data: [0, 0, 0, 0], backgroundColor: ['#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'], borderWidth: 0 }] },
            options: { animation: { duration: 400 }, cutout: '70%' }
        });

        const eventSource = new EventSource('/stream');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Update Unique Users
            document.getElementById('activeUsersCounter').innerText = (data.uniqueUsers || 0).toLocaleString();

            // Update Line Chart (History)
            if (data.history && data.history.length > 0) {
                // Reverse the array so the oldest data is on the left
                const historyData = data.history.map(Number).reverse();
                // Create generic labels like -30s, -20s, -10s
                lineChart.data.labels = historyData.map((_, i) => `-${(historyData.length - 1 - i) * 10}s`);
                lineChart.data.datasets[0].data = historyData;
                lineChart.update();
            }

            // Update Doughnut Chart
            if (data.requests) {
                cityChart.data.datasets[0].data = [
                    parseInt(data.requests['Atlanta'] || 0),
                    parseInt(data.requests['San Francisco'] || 0),
                    parseInt(data.requests['New York'] || 0),
                    parseInt(data.requests['Chicago'] || 0)
                ];
                cityChart.update();
            }

            // Update Leaderboard
            const revenueData = data.revenue || {};
            const sortedCities = Object.entries(revenueData).sort((a, b) => parseFloat(b[1]) - parseFloat(a[1]));
            document.getElementById('leaderboard').innerHTML = sortedCities.map(([city, amount]) => `
                <div class="leaderboard-row">
                    <span class="city-name">${city}</span>
                    <span class="revenue-amount">$${parseFloat(amount).toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                </div>
            `).join('') || '<div class="leaderboard-row">Waiting for completed rides...</div>';
        };
        // --- NEW: Historical Data Logic ---
        
        // Initialize Historical Bar Chart
        const histCtx = document.getElementById('historicalChart').getContext('2d');
        const historicalChart = new Chart(histCtx, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'All-Time Revenue ($)', data: [], backgroundColor: '#6366f1', borderRadius: 4 }] },
            options: { animation: { duration: 800 }, plugins: { legend: { display: false } } }
        });

        // Function to fetch from Postgres API
        async function fetchHistoricalData() {
            try {
                const response = await fetch('/api/history/revenue');
                const data = await response.json();
                
                // Map the Postgres rows to Chart.js arrays
                historicalChart.data.labels = data.map(row => row.city);
                historicalChart.data.datasets[0].data = data.map(row => parseFloat(row.total_revenue));
                historicalChart.update();
            } catch (err) {
                console.error("Failed to fetch historical data", err);
            }
        }

        // Fetch immediately, then poll every 15 seconds (no need to hammer the DB)
        fetchHistoricalData();
        setInterval(fetchHistoricalData, 15000);
    </script>
</body>
</html>
